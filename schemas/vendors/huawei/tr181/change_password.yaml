id: change_password
model: tr181
vendor: huawei
description: >
  Change admin password for Huawei TR-181 devices.
  Huawei uses a proprietary X_HW_Security object instead of the standard
  Device.Users.User path.

parameters:
  - name: admin.password
    path: "Device.X_HW_Security.AdminPassword"
    type: string
