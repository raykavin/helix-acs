id: change_password
model: tr098
description: >
  Change admin password for TR-098 devices.
  TR-098 defines no standard path for the web admin password.
  Use vendor-specific schemas or the set_parameters task with the
  device's proprietary X_ extension path.

parameters:
  # No standard path in TR-098 base spec; vendors use X_ extensions.
  - name: admin.password
    path: ""
    type: string
