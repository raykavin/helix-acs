id: wifi
model: tr181
description: WiFi configuration parameters for TR-181 devices

parameters:
  # 2.4 GHz band (band index 0)
  - name: wifi.ssid.0
    path: "Device.WiFi.SSID.{ssid_0}.SSID"
    type: string
  - name: wifi.password.0
    path: "Device.WiFi.AccessPoint.{ap_0}.Security.KeyPassphrase"
    type: string
  - name: wifi.enabled.0
    path: "Device.WiFi.SSID.{ssid_0}.Enable"
    type: boolean
  - name: wifi.channel.0
    path: "Device.WiFi.Radio.{radio_0}.Channel"
    type: unsignedInt
  - name: wifi.bssid.0
    path: "Device.WiFi.SSID.{ssid_0}.BSSID"
    type: string
  - name: wifi.standard.0
    path: "Device.WiFi.Radio.{radio_0}.OperatingStandards"
    type: string
  - name: wifi.security_mode.0
    path: "Device.WiFi.AccessPoint.{ap_0}.Security.ModeEnabled"
    type: string
  - name: wifi.channel_width.0
    path: "Device.WiFi.Radio.{radio_0}.OperatingChannelBandwidth"
    type: string
  - name: wifi.tx_power.0
    path: "Device.WiFi.Radio.{radio_0}.TransmitPower"
    type: unsignedInt
  - name: wifi.client_count.0
    path: "Device.WiFi.AccessPoint.{ap_0}.AssociatedDeviceNumberOfEntries"
    type: unsignedInt
  - name: wifi.stats.bytes_sent.0
    path: "Device.WiFi.SSID.{ssid_0}.Stats.BytesSent"
    type: unsignedInt
  - name: wifi.stats.bytes_received.0
    path: "Device.WiFi.SSID.{ssid_0}.Stats.BytesReceived"
    type: unsignedInt
  - name: wifi.stats.packets_sent.0
    path: "Device.WiFi.SSID.{ssid_0}.Stats.PacketsSent"
    type: unsignedInt
  - name: wifi.stats.packets_received.0
    path: "Device.WiFi.SSID.{ssid_0}.Stats.PacketsReceived"
    type: unsignedInt
  - name: wifi.stats.errors_sent.0
    path: "Device.WiFi.SSID.{ssid_0}.Stats.ErrorsSent"
    type: unsignedInt
  - name: wifi.stats.errors_received.0
    path: "Device.WiFi.SSID.{ssid_0}.Stats.ErrorsReceived"
    type: unsignedInt

  # 5 GHz band (band index 1)
  - name: wifi.ssid.1
    path: "Device.WiFi.SSID.{ssid_1}.SSID"
    type: string
  - name: wifi.password.1
    path: "Device.WiFi.AccessPoint.{ap_1}.Security.KeyPassphrase"
    type: string
  - name: wifi.enabled.1
    path: "Device.WiFi.SSID.{ssid_1}.Enable"
    type: boolean
  - name: wifi.channel.1
    path: "Device.WiFi.Radio.{radio_1}.Channel"
    type: unsignedInt
  - name: wifi.bssid.1
    path: "Device.WiFi.SSID.{ssid_1}.BSSID"
    type: string
  - name: wifi.standard.1
    path: "Device.WiFi.Radio.{radio_1}.OperatingStandards"
    type: string
  - name: wifi.security_mode.1
    path: "Device.WiFi.AccessPoint.{ap_1}.Security.ModeEnabled"
    type: string
  - name: wifi.channel_width.1
    path: "Device.WiFi.Radio.{radio_1}.OperatingChannelBandwidth"
    type: string
  - name: wifi.tx_power.1
    path: "Device.WiFi.Radio.{radio_1}.TransmitPower"
    type: unsignedInt
  - name: wifi.client_count.1
    path: "Device.WiFi.AccessPoint.{ap_1}.AssociatedDeviceNumberOfEntries"
    type: unsignedInt
  - name: wifi.stats.bytes_sent.1
    path: "Device.WiFi.SSID.{ssid_1}.Stats.BytesSent"
