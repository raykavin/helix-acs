    path: "Device.WiFi.SSID.{ssid_1}.Stats.PacketsReceived"
    type: unsignedInt
  - name: wifi.stats.errors_sent.1
    path: "Device.WiFi.SSID.{ssid_1}.Stats.ErrorsSent"
    type: unsignedInt
