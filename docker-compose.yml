version: '3.8'
services:
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  app:
    build: .
    ports:
      - "7547:7547"
      - "8080:8080"
    environment:
      - HELIX_MONGODB_URI=mongodb://mongo:27017
      - HELIX_REDIS_URI=redis://redis:6379
      - HELIX_LOG_PRETTY=true
      - HELIX_LOG_LEVEL=debug
    volumes:
      - ./configs:/helix/configs
    depends_on:
      - mongo
      - redis
    restart: unless-stopped

networks:
  default:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
